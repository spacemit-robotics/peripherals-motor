module: components/peripherals/motor

tests:
  - name: motor-functional
    description: Verifies motor API behavior for valid and invalid inputs.
    category: functional
    scopes: [pr]
    timeout_s: 600
    workdir: sdk
    command: |
      SROBOTIS_CMAKE_EXTRA_ARGS="-DSROBOTIS_PERIPHERALS_MOTOR_ENABLED_DRIVERS=drv_can_dm;drv_uart_xl330;drv_uart_feetech;drv_ethercat_jmc" \
        ./build/build.sh --log=verbose package components/peripherals/motor
      bash components/peripherals/motor/tests/test_functional.sh
  - name: motor-manual
    description: Manual verification confirms that the motors can be controlled.
    category: functional
    scopes: [manual]
    timeout_s: 600
    workdir: sdk
    command: |
      bash components/peripherals/motor/tests/test_manual.sh

